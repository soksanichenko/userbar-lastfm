{% extends "index.html" %}
{% block title %}Last.fm UserBar{% endblock %}
{% block content %}
<div class="landing">
    <h1 data-i18n="landing_title">Last.fm UserBar</h1>
    <p class="subtitle" data-i18n="landing_subtitle">
        Generate a live userbar image showing what you're scrobbling on Last.fm.
    </p>
    <a href="{{ url_for('lastfm_app.generator') }}" class="btn btn-primary btn-lg"
       data-i18n="landing_btn">Open Generator</a>
    <div class="preview">
        <img src="{{ url_for('lastfm_app.new_user_bar', username='zelgray',
             params='border_color=0_0_0&logo_color=0_0_0') }}"
             alt="ZelGray Last.fm UserBar">
    </div>
    <footer>Zelgadiss Graywords &copy; 2016</footer>
</div>
{% endblock %}
