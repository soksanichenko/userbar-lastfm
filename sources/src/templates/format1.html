{% extends "index.html" %}
{% block title %}Last.fm UserBar Generator{% endblock %}
{% block content %}
<main>
    <div class="intro">
        <h1 data-i18n="page_title">Last.Fm UserBar Generator</h1>
    </div>

    <div class="section">

        <!-- Username -->
        <div class="form-group">
            <label for="username" data-i18n="username_label">Last.fm Username</label>
            <div class="input-with-status">
                <input type="text" id="username" class="form-input"
                       data-i18n-placeholder="username_placeholder"
                       placeholder="e.g. ZelGray" value="ZelGray" autocomplete="off">
                <span class="status-badge">
                    <span class="spinner d-none" id="username-spinner"></span>
                    <span id="username-ok" class="status-ok d-none">&#10003;</span>
                    <span id="username-err" class="status-err d-none">&#10007;</span>
                </span>
            </div>
            <div id="username-feedback" class="form-feedback d-none"></div>
        </div>

        <!-- Always-on color pickers -->
        <div class="color-grid">
            <div class="form-group">
                <label for="inner_color" data-i18n="inner_color">Inner color</label>
                <input type="color" id="inner_color" class="color-input" value="#000000">
            </div>
            <div class="form-group">
                <label for="outer_color" data-i18n="outer_color">Outer color</label>
                <input type="color" id="outer_color" class="color-input" value="#ffffff">
            </div>
            <div class="form-group">
                <label for="text_color" data-i18n="text_color">Text color</label>
                <input type="color" id="text_color" class="color-input" value="#ffffff">
            </div>
        </div>

        <!-- Optional color pickers with toggles -->
        <div class="color-grid-2">
            <div class="form-group">
                <label class="toggle">
                    <input type="checkbox" id="enable_border"
                           onchange="togglePicker('border_color', this)">
                    <span class="toggle-text" data-i18n="border_color">Border color</span>
                </label>
                <input type="color" id="border_color" class="color-input"
                       value="#000000" disabled>
            </div>
            <div class="form-group">
                <label class="toggle">
                    <input type="checkbox" id="enable_logo"
                           onchange="togglePicker('logo_color', this)">
                    <span class="toggle-text" data-i18n="logo_color">Logo color</span>
                </label>
                <input type="color" id="logo_color" class="color-input"
                       value="#000000" disabled>
            </div>
        </div>

        <!-- Truncate -->
        <div class="form-group">
            <label class="toggle">
                <input type="checkbox" id="truncate_text">
                <span class="toggle-text" data-i18n="truncate_text">Truncate image to 750px</span>
            </label>
        </div>

        <!-- Generate button -->
        <button type="button" class="btn btn-primary btn-full" onclick="generate()"
                data-i18n="generate_btn">Generate userbar</button>

    </div>

    <!-- Result section (hidden until generate is clicked) -->
    <div id="result-section" class="section d-none">
        <h2 data-i18n="result_title">YOUR USERBAR</h2>

        <div class="result-preview">
            <a id="result-profile-link" href="#" target="_blank" rel="noopener">
                <img id="result-img" src="" alt="userbar">
            </a>
        </div>

        <div class="form-group">
            <label data-i18n="direct_link">Direct link</label>
            <div class="input-group">
                <input type="text" id="result-url" class="form-input mono" readonly>
                <button class="btn btn-secondary" onclick="copyField('result-url')"
                        data-i18n="copy">Copy</button>
            </div>
        </div>
        <div class="form-group">
            <label data-i18n="bb_code">BB-code</label>
            <div class="input-group">
                <input type="text" id="result-bb" class="form-input mono" readonly>
                <button class="btn btn-secondary" onclick="copyField('result-bb')"
                        data-i18n="copy">Copy</button>
            </div>
        </div>
        <div class="form-group">
            <label data-i18n="bb_code_link">BB-code + profile link</label>
            <div class="input-group">
                <input type="text" id="result-bb-link" class="form-input mono" readonly>
                <button class="btn btn-secondary" onclick="copyField('result-bb-link')"
                        data-i18n="copy">Copy</button>
            </div>
        </div>
        <div class="form-group">
            <label data-i18n="html">HTML</label>
            <div class="input-group">
                <input type="text" id="result-html" class="form-input mono" readonly>
                <button class="btn btn-secondary" onclick="copyField('result-html')"
                        data-i18n="copy">Copy</button>
            </div>
        </div>
        <div class="form-group">
            <label data-i18n="html_link">HTML + profile link</label>
            <div class="input-group">
                <input type="text" id="result-html-link" class="form-input mono" readonly>
                <button class="btn btn-secondary" onclick="copyField('result-html-link')"
                        data-i18n="copy">Copy</button>
            </div>
        </div>
    </div>
</main>
{% endblock %}
{% block scripts %}
<script>const ROOT_URL = {{ root_url | tojson }};</script>
<script src="{{ url_for('static', filename='js/generator.js') }}"></script>
{% endblock %}
