<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% block metas %}{% endblock %}
    <title>{% block title %}{% endblock %}</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
    {% block styles %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    {% endblock %}
</head>
<body{% block body_attribs %} class="center"{% endblock %}>
    {% block content %}
    <hr>
    <img src="{{ url_for('lastfm_app.new_user_bar', username='zelgray',
         params='border_color=0_0_0&logo_color=0_0_0', _external=True, _scheme='https') }}"
         alt="ZelGray Last.fm UserBar">
    <hr>
    <div class="info">Partially not work on Internet Explorer and Safari<br>
        Zelgadiss Graywords, 2016 &copy;
    </div>
    {% endblock %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmkF+E+ZVFqR//A5hrAWV/ruV5GD"
            crossorigin="anonymous"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
